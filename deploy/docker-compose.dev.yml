services:
  # MySQL 数据库
  mysql:
    image: mysql:8.0
    pull_policy: always
    container_name: opendataworks-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-opendataworks}
      MYSQL_USER: ${MYSQL_USER:-opendataworks}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-opendataworks123}
      TZ: ${TZ:-Asia/Shanghai}
    ports:
      - "3316:3306"
    volumes:
      - mysql-data:/var/lib/mysql
      - ./database/mysql:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot123"]
      interval: 10s
      timeout: 5s
      retries: 5
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-authentication-plugin=mysql_native_password

  # 后端服务
  backend:
    image: mikefan2019/opendataworks-backend:latest
    pull_policy: always
    container_name: opendataworks-backend
    restart: always
    env_file:
      - ./.env
    # DolphinScheduler 不包含在本 Compose 中，配置请在系统管理界面进行
    ports:
      - "8080:8080"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8080/api/v1/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    volumes:
      - backend-logs:/app/logs

  # 前端服务
  frontend:
    image: opendataworks-frontend:dev
    build:
      context: ../frontend
      dockerfile: Dockerfile
    container_name: opendataworks-frontend
    restart: always
    env_file:
      - ./.env
    ports:
      - "8081:80"
    depends_on:
      backend:
        condition: service_healthy
      dataagent-backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # DataAgent 后端服务（NL2SQL）
  dataagent-backend:
    image: python:3.11-slim
    container_name: opendataworks-dataagent-backend
    restart: always
    env_file:
      - ./.env
    working_dir: /workspace/dataagent/dataagent-backend
    command: 'sh -c "pip install --cache-dir /root/.cache/pip -r requirements.txt && alembic upgrade head && uvicorn main:app --host 0.0.0.0 --port 8900"'
    environment:
      PYTHONUNBUFFERED: "1"
      HOST: 0.0.0.0
      PORT: 8900
      MYSQL_HOST: mysql
      MYSQL_PORT: 3306
      MYSQL_USER: ${DATAAGENT_MYSQL_USER:-dataagent}
      MYSQL_PASSWORD: ${DATAAGENT_MYSQL_PASSWORD:-dataagent123}
      MYSQL_DATABASE: ${DATAAGENT_MYSQL_DATABASE:-opendataworks}
      SESSION_MYSQL_DATABASE: ${DATAAGENT_SESSION_MYSQL_DATABASE:-dataagent}
      SKILLS_OUTPUT_DIR: ${DATAAGENT_SKILLS_OUTPUT_DIR:-../.claude/skills/dataagent-nl2sql}
      LLM_PROVIDER: ${DATAAGENT_LLM_PROVIDER:-anyrouter}
      CLAUDE_MODEL: ${DATAAGENT_CLAUDE_MODEL:-claude-opus-4-6}
      ANTHROPIC_AUTH_TOKEN: ${DATAAGENT_ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_API_KEY: ${DATAAGENT_ANTHROPIC_API_KEY:-}
      ANTHROPIC_BASE_URL: ${DATAAGENT_ANTHROPIC_BASE_URL:-https://a-ocnfniawgw.cn-shanghai.fcapp.run}
    ports:
      - "8900:8900"
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8900/api/v1/nl2sql/health').read()"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 120s
    volumes:
      - ../dataagent/dataagent-backend:/workspace/dataagent/dataagent-backend
      - ${DATAAGENT_LLM_JSON_FILE:-../dataagent/.claude/settings.json}:/workspace/dataagent/.claude/settings.json
      - ${DATAAGENT_SKILLS_DIR:-../dataagent/.claude/skills}:/workspace/dataagent/.claude/skills
      - dataagent-backend-pip-cache:/root/.cache/pip

volumes:
  mysql-data:
    driver: local
  backend-logs:
    driver: local
  dataagent-backend-pip-cache:
    driver: local
